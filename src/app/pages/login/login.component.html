<div class="login-page d-flex align-items-center justify-content-center">
  <button class="btn theme-toggle-btn rounded-circle d-flex align-items-center justify-content-center" (click)="themeService.toggleTheme()">
    <i class="bi" [class.bi-sun-fill]="themeService.isDark()" [class.bi-moon-fill]="!themeService.isDark()"></i>
  </button>

  <div class="card border-0 shadow-sm login-card">
    <div class="card-body p-4 p-md-5">
      <div class="brand d-flex align-items-center mb-4">
        <div class="brand-icon me-2">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="48" height="48" rx="14" fill="#40916c"/>
            <path d="M24 10C18.477 10 14 14.477 14 20C14 27.5 24 38 24 38C24 38 34 27.5 34 20C34 14.477 29.523 10 24 10Z" fill="#ffffff" fill-opacity="0.15"/>
            <path d="M19 20.5L22.5 24L29 17" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="brand-name">FrotaCheck</span>
      </div>

      <h2 class="h4 fw-bold mb-1">Acessar sua conta</h2>
      <p class="text-muted small mb-4">Entre com seu email e senha.</p>

      <form (ngSubmit)="onLogin()">
        <div class="form-group mb-3">
          <label class="form-label" for="email">Email</label>
          <input id="email" type="email" name="email" class="form-control" [(ngModel)]="email" placeholder="voce@empresa.com" autocomplete="email" required>
        </div>

        <div class="form-group mb-3">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <label class="form-label mb-0" for="password">Senha</label>
            <a href="#" class="small forgot text-decoration-none">Esqueceu a senha?</a>
          </div>
          <div class="input-group">
            <input id="password" [type]="showPassword ? 'text' : 'password'" name="password" class="form-control" [(ngModel)]="password" placeholder="••••••••" autocomplete="current-password" required>
            <button class="btn btn-outline-secondary" type="button" (click)="togglePassword()">
              <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
            </button>
          </div>
        </div>

        <div class="form-check mb-4">
          <input type="checkbox" class="form-check-input" id="rememberMe" name="rememberMe" [(ngModel)]="rememberMe">
          <label class="form-check-label small" for="rememberMe">Lembrar de mim</label>
        </div>

        <button type="submit" class="btn btn-success w-100 d-flex align-items-center justify-content-center gap-2" [disabled]="isLoading">
          <span *ngIf="!isLoading">Entrar</span>
          <span *ngIf="isLoading" class="spinner-border spinner-border-sm" role="status"></span>
          <span *ngIf="isLoading">Entrando...</span>
        </button>

        <p class="register text-center small mb-0 mt-3">Não tem conta? <a routerLink="/register" class="text-decoration-none">Criar conta</a></p>
      </form>
    </div>
  </div>
</div>
