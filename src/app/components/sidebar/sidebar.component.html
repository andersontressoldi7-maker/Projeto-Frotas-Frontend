<div class="global-hamburger" (click)="openMobile()">
  <i class="bi bi-list"></i>
</div>

<div class="sidebar d-flex flex-column p-3" [class.is-mini]="isCollapsed" [class.mobile-open]="isMobileOpen">
  <div class="brand d-flex align-items-center justify-content-between mb-4 px-2">
    <div class="d-flex align-items-center logo-area">
      <i class="bi bi-truck-flatbed me-2 fs-4 text-success"></i>
      <span class="fs-4 fw-bold logo-text">FrotaCheck</span>
    </div>
    <button class="btn p-0 toggle-btn mx-auto desktop-toggle" (click)="toggleSidebar()">
      <i class="bi" [class.bi-list]="!isCollapsed" [class.bi-arrow-right-short]="isCollapsed" style="font-size: 1.25rem;"></i>
    </button>
  </div>
  
  <small class="text-muted px-2 mb-2 text-uppercase fw-bold text-xs menu-label">Menu</small>
  
  <ul class="nav nav-pills flex-column mb-auto">
    <li class="nav-item mb-1" *ngFor="let item of menuItems">
      <a [routerLink]="item.route" routerLinkActive="active" class="nav-link d-flex align-items-center" [title]="item.label" (click)="closeMobile()">
        <i class="bi {{ item.icon }}" [class.me-3]="!isCollapsed"></i>
        <span class="nav-text">{{ item.label }}</span>
        <span class="shortcut-badge ms-auto" *ngIf="item.shortcut">{{ item.shortcut }}</span>
      </a>
    </li>
  </ul>

  <div class="theme-toggle-container d-flex justify-content-center pt-3 border-top">
    <button class="btn btn-link p-2 d-flex align-items-center justify-content-center theme-btn w-100" (click)="themeService.toggleTheme()">
      <i class="bi" [class.bi-sun-fill]="themeService.isDark()" [class.bi-moon-fill]="!themeService.isDark()" style="font-size: 1.15rem;"></i>
      <span class="ms-2 small fw-medium nav-text">
        {{ themeService.isDark() ? 'Modo Claro' : 'Modo Escuro' }}
      </span>
    </button>
    <button class="btn btn-link p-2 d-flex align-items-center justify-content-center logout-btn w-100" (click)="logout()" title="Sair" aria-label="Sair" [attr.data-title]="'Sair'">
      <i class="bi bi-box-arrow-right text-danger" style="font-size: 1.15rem;"></i>
      <span class="ms-2 small fw-medium text-danger nav-text">Sair</span>
    </button>
  </div>
</div>

<div class="sidebar-backdrop" *ngIf="isMobileOpen" (click)="closeMobile()"></div>
